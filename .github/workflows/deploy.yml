name: CD - Deploy to Kubernetes

on:
  push:
    branches:
      - main
      - develop
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        type: choice
        options:
          - dev
          - staging
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/queue-management-api

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
  
  run-database-migrations:
    name: Run Database Migrations
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'release'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure kubectl
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG_PROD }}
      
      - name: Run Alembic migrations
        run: |
          kubectl run alembic-migrate --rm -i --restart=Never \
            --image=${{ needs.build-and-push.outputs.image-tag }} \
            --namespace=queue-management-prod \
            --env="DATABASE_URL=${{ secrets.DATABASE_URL_PROD }}" \
            -- alembic upgrade head
  
  deploy-to-dev:
    name: Deploy to Development
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    environment:
      name: development
      url: https://queue.dev.example.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure kubectl
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG_DEV }}
      
      - name: Deploy to Development
        run: |
          cd k8s/overlays/dev
          kustomize edit set image queue-management-api=${{ needs.build-and-push.outputs.image-tag }}
          kubectl apply -k .
      
      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/dev-queue-api -n queue-management-dev --timeout=5m
      
      - name: Verify deployment
        run: |
          kubectl get pods -n queue-management-dev -l app=queue-api
  
  deploy-to-staging:
    name: Deploy to Staging
    needs: [build-and-push, run-database-migrations]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: https://queue.staging.example.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure kubectl
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG_STAGING }}
      
      - name: Deploy to Staging
        run: |
          cd k8s/overlays/staging
          kustomize edit set image queue-management-api=${{ needs.build-and-push.outputs.image-tag }}
          kubectl apply -k .
      
      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/staging-queue-api -n queue-management-staging --timeout=10m
      
      - name: Run smoke tests
        run: |
          STAGING_URL="https://queue.staging.example.com"
          
          # Health check
          curl -f "$STAGING_URL/health" || exit 1
          
          # API test
          curl -f "$STAGING_URL/api/status" || exit 1
          
          echo "✅ Smoke tests passed"
  
  deploy-to-production:
    name: Deploy to Production
    needs: [build-and-push, deploy-to-staging]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    environment:
      name: production
      url: https://queue.production.example.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure kubectl
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG_PROD }}
      
      - name: Create pre-deployment backup
        run: |
          kubectl create job --from=cronjob/database-backup \
            backup-pre-deploy-$(date +%s) \
            -n queue-management-prod
      
      - name: Deploy to Production
        run: |
          cd k8s/overlays/prod
          kustomize edit set image queue-management-api=${{ needs.build-and-push.outputs.image-tag }}
          kubectl apply -k .
      
      - name: Wait for rollout (canary)
        run: |
          # Deploy with canary strategy
          kubectl patch deployment prod-queue-api -n queue-management-prod \
            -p '{"spec":{"replicas":1}}'
          
          kubectl rollout status deployment/prod-queue-api -n queue-management-prod --timeout=5m
          
          # Monitor for 5 minutes
          sleep 300
          
          # Check error rates
          ERROR_RATE=$(kubectl exec -n monitoring prometheus-0 -- \
            promtool query instant 'rate(http_requests_total{status=~"5..",namespace="queue-management-prod"}[5m])' \
            | grep -oP '\d+\.\d+' || echo "0")
          
          if (( $(echo "$ERROR_RATE > 0.01" | bc -l) )); then
            echo "❌ High error rate detected: $ERROR_RATE"
            kubectl rollout undo deployment/prod-queue-api -n queue-management-prod
            exit 1
          fi
          
          echo "✅ Canary deployment successful, scaling up..."
          kubectl patch deployment prod-queue-api -n queue-management-prod \
            -p '{"spec":{"replicas":5}}'
      
      - name: Verify production deployment
        run: |
          kubectl rollout status deployment/prod-queue-api -n queue-management-prod --timeout=10m
          
          # Final health check
          PROD_URL="https://queue.production.example.com"
          for i in {1..5}; do
            curl -f "$PROD_URL/health" && break
            sleep 10
          done
      
      - name: Notify deployment
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            Production deployment ${{ job.status }}
            Version: ${{ github.ref_name }}
            Image: ${{ needs.build-and-push.outputs.image-tag }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
  
  rollback:
    name: Rollback on Failure
    needs: deploy-to-production
    runs-on: ubuntu-latest
    if: failure()
    
    steps:
      - name: Configure kubectl
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG_PROD }}
      
      - name: Rollback deployment
        run: |
          echo "🔄 Rolling back production deployment..."
          kubectl rollout undo deployment/prod-queue-api -n queue-management-prod
          kubectl rollout status deployment/prod-queue-api -n queue-management-prod
      
      - name: Notify rollback
        uses: 8398a7/action-slack@v3
        with:
          status: 'warning'
          text: 'Production deployment rolled back due to failures'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
