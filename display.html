<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Queue Display Screen</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0a0e2e;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a237e;
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 3px solid #3949ab;
    }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .flag { font-size: 40px; }
    header h1 { font-size: 22px; font-weight: 800; }
    header p { font-size: 13px; opacity: 0.7; margin-top: 2px; }
    .clock { font-size: 28px; font-weight: 700; font-variant-numeric: tabular-nums; color: #90caf9; }

    main {
      flex: 1;
      padding: 24px 32px;
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 24px;
    }
    @media (max-width: 768px) {
      main { grid-template-columns: 1fr; }
    }

    /* Now Serving */
    .now-serving { }
    .section-title {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #90caf9;
      margin-bottom: 16px;
      font-weight: 600;
    }

    .serving-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    .serving-card {
      background: linear-gradient(135deg, #1a237e, #283593);
      border: 2px solid #3949ab;
      border-radius: 16px;
      padding: 24px;
      text-align: center;
      animation: pulse 2s infinite;
      box-shadow: 0 0 30px rgba(57, 73, 171, 0.4);
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 20px rgba(57,73,171,0.3); }
      50% { box-shadow: 0 0 40px rgba(57,73,171,0.7); }
    }
    .serving-card .counter-label {
      font-size: 12px;
      color: #90caf9;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .serving-card .counter-number {
      font-size: 13px;
      color: #ffcc02;
      font-weight: 700;
      margin-top: 4px;
    }
    .serving-card .ticket-num {
      font-size: 52px;
      font-weight: 900;
      color: #fff;
      line-height: 1;
      margin: 12px 0;
      text-shadow: 0 0 20px rgba(255,255,255,0.3);
    }

    .no-serving {
      grid-column: 1/-1;
      text-align: center;
      padding: 40px;
      color: #3949ab;
      font-size: 18px;
    }

    /* Sidebar stats */
    .sidebar { display: flex; flex-direction: column; gap: 16px; }

    .stat-card {
      background: #131740;
      border: 1px solid #1e2562;
      border-radius: 12px;
      padding: 20px 24px;
      text-align: center;
    }
    .stat-card .val {
      font-size: 52px;
      font-weight: 900;
      line-height: 1;
    }
    .stat-card .lbl { font-size: 12px; color: #90caf9; margin-top: 6px; text-transform: uppercase; letter-spacing: 1px; }
    .val-blue { color: #42a5f5; }
    .val-green { color: #66bb6a; }
    .val-yellow { color: #ffca28; }

    /* Waiting queue ticker */
    .waiting-section { margin-top: 24px; }
    .waiting-scroll {
      display: flex;
      gap: 12px;
      overflow: hidden;
      padding: 4px 0;
    }
    .waiting-chip {
      background: #131740;
      border: 1px solid #1e2562;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 16px;
      font-weight: 700;
      white-space: nowrap;
      color: #e0e0e0;
      flex-shrink: 0;
    }
    .waiting-chip .svc { font-size: 10px; color: #90caf9; font-weight: 400; display: block; margin-top: 2px; }

    /* Status bar */
    footer {
      background: #131740;
      padding: 10px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: #3949ab;
      border-top: 1px solid #1e2562;
    }
    .dot {
      display: inline-block;
      width: 8px; height: 8px;
      background: #66bb6a;
      border-radius: 50%;
      margin-right: 6px;
      animation: blink 1.5s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="flag">🇪🇹</div>
    <div>
      <h1>Queue Management System</h1>
      <p>Ethiopia — Please wait for your number to be called</p>
    </div>
  </div>
  <div class="clock" id="clock">--:--:--</div>
</header>

<main>
  <div class="now-serving">
    <div class="section-title">📢 Now Serving</div>
    <div class="serving-grid" id="serving-grid">
      <div class="no-serving">No tickets currently being served</div>
    </div>

    <div class="waiting-section">
      <div class="section-title" style="margin-top:24px;">⏳ Waiting Queue</div>
      <div class="waiting-scroll" id="waiting-chips">
        <div style="color:#3949ab;">Loading...</div>
      </div>
    </div>
  </div>

  <div class="sidebar">
    <div class="stat-card">
      <div class="val val-blue" id="s-waiting">-</div>
      <div class="lbl">People Waiting</div>
    </div>
    <div class="stat-card">
      <div class="val val-green" id="s-served">-</div>
      <div class="lbl">Served Today</div>
    </div>
    <div class="stat-card">
      <div class="val val-yellow" id="s-wait-time">~15</div>
      <div class="lbl">Avg Wait (min)</div>
    </div>
  </div>
</main>

<footer>
  <div><span class="dot"></span>Live — refreshes every 5 seconds</div>
  <div id="last-updated">Last updated: --</div>
</footer>

<script>
  const API = '';

  // Clock
  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent = now.toLocaleTimeString('en-ET', { hour12: false });
  }
  setInterval(updateClock, 1000);
  updateClock();

  async function refresh() {
    try {
      const [statusRes, queueRes] = await Promise.all([
        fetch(`${API}/api/display/queue-status`),
        fetch(`${API}/api/display/waiting-tickets`)
      ]);
      const status = await statusRes.json();
      const queue = await queueRes.json();

      // Now serving
      const grid = document.getElementById('serving-grid');
      if (status.now_serving && status.now_serving.length > 0) {
        grid.innerHTML = status.now_serving.map(t => `
          <div class="serving-card">
            <div class="counter-label">Counter</div>
            <div class="counter-number">${t.counter_number ?? '-'}</div>
            <div class="ticket-num">${t.ticket_number}</div>
          </div>
        `).join('');
      } else {
        grid.innerHTML = '<div class="no-serving">No tickets currently being served</div>';
      }

      // Stats
      document.getElementById('s-waiting').textContent = status.waiting_count ?? '-';
      document.getElementById('s-served').textContent = status.total_served_today ?? '-';
      document.getElementById('s-wait-time').textContent = `~${status.average_wait_minutes ?? 15}`;

      // Waiting chips
      const chips = document.getElementById('waiting-chips');
      if (queue.tickets && queue.tickets.length > 0) {
        chips.innerHTML = queue.tickets.map(t => `
          <div class="waiting-chip">
            ${t.ticket_number}
            <span class="svc">${t.service_type.replace(/_/g,' ')}</span>
          </div>
        `).join('');
      } else {
        chips.innerHTML = '<div style="color:#3949ab; padding:10px;">No one waiting</div>';
      }

      document.getElementById('last-updated').textContent =
        'Last updated: ' + new Date().toLocaleTimeString();
    } catch (e) {
      console.error('Refresh error:', e);
    }
  }

  refresh();
  setInterval(refresh, 5000);
</script>
</body>
</html>
