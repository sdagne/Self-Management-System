<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queue Display | Ethiopia Queue Management System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0d3b66, #117a8b, #2ec4b6);
            color: white;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 3em;
            margin-bottom: 10px;
        }

        .header .subtitle {
            font-size: 1.5em;
            opacity: 0.9;
        }

        .main-content {
            padding: 40px;
        }

        .now-serving-section {
            margin-bottom: 50px;
        }

        .section-title {
            font-size: 2em;
            color: white;
            margin-bottom: 30px;
            text-align: center;
        }

        .serving-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .serving-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(102, 126, 234, 0.3);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 10px 40px rgba(102, 126, 234, 0.3);
            }
            50% {
                transform: scale(1.02);
                box-shadow: 0 15px 50px rgba(102, 126, 234, 0.5);
            }
        }

        .serving-card .label {
            font-size: 1.2em;
            opacity: 0.8;
            margin-bottom: 15px;
        }

        .serving-card .ticket-number {
            font-size: 5em;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .serving-card .counter {
            font-size: 2em;
            font-weight: bold;
            background: rgba(255,255,255,0.2);
            padding: 10px 20px;
            border-radius: 10px;
            display: inline-block;
        }

        .stats-section {
            /* Stats row beneath serving cards */
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            margin-bottom: 40px;
        }

        .stat-box {
            background: rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            border: 2px solid rgba(255,255,255,0.2);
        }

        .stat-box h3 {
            font-size: 3em;
            margin-bottom: 10px;
        }

        .stat-box p {
            font-size: 1.2em;
            opacity: 0.8;
        }

        .stat-box.waiting {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            border-color: rgba(59,130,246,0.6);
            color: white;
        }

        .stat-box.served {
            background: linear-gradient(135deg, #10b981, #047857);
            border-color: rgba(16,185,129,0.6);
            color: white;
        }

        .stat-box.avg {
            background: linear-gradient(135deg, #ef4444, #b91c1c);
            border-color: rgba(239,68,68,0.6);
            color: white;
        }

        .stat-box h3 {
            color: inherit;
        }

        .stat-box p {
            color: rgba(255,255,255,0.85);
        }

        .waiting-list {
            background: rgba(255,255,255,0.05);
            padding: 30px;
            border-radius: 15px;
            max-height: 300px;
            overflow-y: auto;
        }

        .waiting-item {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }

        .waiting-item .ticket {
            font-size: 1.5em;
            font-weight: bold;
            color: white;
        }

        .no-tickets {
            text-align: center;
            padding: 60px;
            font-size: 2em;
            color: white;
        }

        .time-display {
            text-align: center;
            font-size: 1.5em;
            color: rgba(255,255,255,0.7);
            margin-top: 30px;
        }

        .blink {
            animation: blink 1.5s linear infinite;
        }

        @keyframes blink {
            0%, 49% {
                opacity: 1;
            }
            50%, 100% {
                opacity: 0.3;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>SAN Queue Management System</h1>
        <p class="subtitle">Public Display - Please Wait for Your Number</p>
    </div>

    <div class="main-content">
        <div class="now-serving-section">
            <h2 class="section-title blink">NOW SERVING</h2>
            <div class="serving-grid" id="servingGrid">
                <div class="no-tickets">No one currently being served</div>
            </div>
        </div>

        <div class="stats-section">
            <div class="stat-box waiting">
                <h3 id="waitingCount">-</h3>
                <p>People Waiting</p>
            </div>
            <div class="stat-box served">
                <h3 id="servedToday">-</h3>
                <p>Served Today</p>
            </div>
            <div class="stat-box avg">
                <h3 id="avgWait">-</h3>
                <p>Average Waiting Time (min)</p>
            </div>
        </div>

        <h2 class="section-title">WAITING LIST</h2>
        <div class="waiting-list" id="waitingList">
            <p style="text-align: center; opacity: 0.5;">Queue is empty</p>
        </div>

        <div class="time-display" id="timeDisplay"></div>
    </div>

    <script>
        const API_BASE = window.location.origin;

        // Update time every second
        setInterval(updateTime, 1000);
        updateTime();

        // Refresh queue every 3 seconds
        setInterval(refreshDisplay, 3000);
        refreshDisplay();

        function updateTime() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('en-US', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: true
            });
            const dateString = now.toLocaleDateString('en-US', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
            document.getElementById('timeDisplay').textContent = `${dateString} - ${timeString}`;
        }

        async function refreshDisplay() {
            // Fetch serving status
            fetch(`${API_BASE}/api/display/queue-status`)
                .then(res => res.json())
                .then(data => {
                    updateServingDisplay(data.now_serving);
                    document.getElementById('waitingCount').textContent = data.waiting_count || 0;
                    document.getElementById('servedToday').textContent = data.total_served_today || 0;
                })
                .catch(err => console.error('Serving sync error:', err));

            // Fetch statistics
            fetch(`${API_BASE}/api/statistics`)
                .then(res => res.json())
                .then(data => {
                    const avgWait = data.average_service_time_minutes;
                    document.getElementById('avgWait').textContent = avgWait > 0 ? Math.round(avgWait) : '-';
                })
                .catch(err => console.error('Stats sync error:', err));

            // Fetch waiting list
            fetch(`${API_BASE}/api/display/waiting-tickets`)
                .then(res => res.json())
                .then(data => {
                    updateWaitingDisplay(data.tickets);
                })
                .catch(err => console.error('Waiting list sync error:', err));
        }

        function updateServingDisplay(nowServing) {
            const servingGrid = document.getElementById('servingGrid');

            if (!nowServing || nowServing.length === 0) {
                servingGrid.innerHTML = '<div class="no-tickets">No one currently being served</div>';
                return;
            }

            let html = '';
            nowServing.forEach(ticket => {
                const counterNum = ticket.counter_number || 1;
                html += `
                    <div class="serving-card">
                        <div class="label">TICKET NUMBER</div>
                        <div class="ticket-number">${ticket.ticket_number}</div>
                        <div class="counter">COUNTER ${counterNum}</div>
                    </div>
                `;
            });

            servingGrid.innerHTML = html;
        }

        function updateWaitingDisplay(tickets) {
            const list = document.getElementById('waitingList');
            if (!tickets || tickets.length === 0) {
                list.innerHTML = '<p style="text-align: center; opacity: 0.5;">Queue is empty</p>';
                return;
            }

            list.innerHTML = tickets.map(t => `
                <div class="waiting-item">
                    <div class="ticket">${t.ticket_number}</div>
                    <div style="opacity: 0.7;">${t.service_type.replace('_', ' ').toUpperCase()}</div>
                </div>
            `).join('');
        }

        function updateStats(queueData, statsData) {
            document.getElementById('waitingCount').textContent = queueData.waiting_count || 0;
            document.getElementById('servedToday').textContent = queueData.total_served_today || 0;

            const avgWait = statsData.average_service_time_minutes;
            document.getElementById('avgWait').textContent =
                avgWait > 0 ? Math.round(avgWait) : '-';
        }
    </script>
</body>
</html>
