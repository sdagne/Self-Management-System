# Secrets management integration with External Secrets Operator
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: queue-management-prod
spec:
  provider:
    vault:
      server: "https://vault.example.com"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "queue-management"
          serviceAccountRef:
            name: queue-api-sa
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: app-secrets
  namespace: queue-management-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: app-secrets
    creationPolicy: Owner
  data:
    - secretKey: SECRET_KEY
      remoteRef:
        key: queue-management/prod
        property: secret_key
    - secretKey: ADMIN_TOKEN
      remoteRef:
        key: queue-management/prod
        property: admin_token
    - secretKey: COUNTER_TOKEN
      remoteRef:
        key: queue-management/prod
        property: counter_token
    - secretKey: TELEGRAM_BOT_TOKEN
      remoteRef:
        key: queue-management/prod
        property: telegram_bot_token
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postgres-credentials
  namespace: queue-management-prod
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: postgres-credentials
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: queue-management/prod/postgres
        property: username
    - secretKey: password
      remoteRef:
        key: queue-management/prod/postgres
        property: password
    - secretKey: connection-string
      remoteRef:
        key: queue-management/prod/postgres
        property: connection_string
