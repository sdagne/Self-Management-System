version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: queue_app
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql://queueuser:queuepassword@db:5432/queue_management
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - APP_ENV=development
      # Set the following in a .env file or your secrets manager:
      # SECRET_KEY=
      # ADMIN_TOKEN=
      # COUNTER_TOKEN=
      # DISPLAY_TOKEN=
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - queue_network

  db:
    image: postgres:15-alpine
    container_name: queue_db
    environment:
      POSTGRES_USER: queueuser
      POSTGRES_PASSWORD: queuepassword
      POSTGRES_DB: queue_management
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U queueuser -d queue_management"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - queue_network

  redis:
    image: redis:7-alpine
    container_name: queue_redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - queue_network

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: queue_celery_worker
    command: celery -A app.core.celery_config.celery_app worker --loglevel=info --concurrency=4
    environment:
      - DATABASE_URL=postgresql://queueuser:queuepassword@db:5432/queue_management
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    env_file:
      - .env
    depends_on:
      - db
      - redis
    restart: unless-stopped
    networks:
      - queue_network

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: queue_celery_beat
    command: celery -A app.core.celery_config.celery_app beat --loglevel=info
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/1
    env_file:
      - .env
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - queue_network

  flower:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: queue_flower
    command: celery -A app.core.celery_config.celery_app flower --port=5555
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    env_file:
      - .env
    depends_on:
      - redis
      - celery-worker
    restart: unless-stopped
    networks:
      - queue_network

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: queue_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    networks:
      - queue_network
    profiles:
      - monitoring   # Only started with: docker-compose --profile monitoring up

  grafana:
    image: grafana/grafana:10.4.0
    container_name: queue_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - queue_network
    profiles:
      - monitoring

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  queue_network:
    driver: bridge
